<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="The Ledger" />
<meta name="theme-color" content="#0A0C13" />
<title>The Ledger</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230A0C13'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='%23D4A857' font-family='serif'%3EL%3C/text%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: Georgia, serif;
    background: radial-gradient(ellipse at top, #151827 0%, #0A0C13 60%);
    color: #dcd6c8;
    min-height: 100vh;
  }
  .font-display { font-family: 'Fraunces', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #262A38; padding-bottom: 20px; margin-bottom: 18px; }
  h1 { font-size: 26px; font-weight: 900; margin: 0; background: linear-gradient(135deg,#F2ECD9,#D4A857); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { color: #6b7280; font-size: 12px; margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; background: #12141F; border: 1px solid #262A38; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
  .tab { flex: 1; text-align: center; padding: 9px 0; border-radius: 9px; font-size: 13px; font-weight: 600; color: #6b7280; cursor: pointer; transition: all .15s; }
  .tab.active { background: linear-gradient(135deg,#D4A857,#B98A3D); color: #0A0C13; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .card { background: #12141F; border: 1px solid #262A38; border-radius: 12px; padding: 12px; }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; margin-bottom: 4px; }
  .value { font-size: 18px; font-weight: 700; }
  .pos { color: #6FAE8C; } .neg { color: #C76B63; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; margin: 20px 0 10px; display:flex; justify-content:space-between; align-items:center; }
  button.primary { background: linear-gradient(135deg,#D4A857,#B98A3D); color: #0A0C13; border: none; font-weight: 700; padding: 8px 14px; border-radius: 10px; font-size: 13px; }

  .entry { display: flex; justify-content: space-between; align-items: center; background: #12141F; border: 1px solid #262A38; border-radius: 10px; padding: 12px; margin-bottom: 8px; gap: 10px; }
  .entry .thumb { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; border: 1px solid #262A38; flex-shrink: 0; cursor: pointer; }
  .entry .meta { font-size: 12px; color: #6b7280; }
  .entry .strat-chip { display:inline-block; font-size: 10px; background:#1B2030; color:#D4A857; padding:1px 7px; border-radius: 20px; margin-top:4px; border:1px solid #33301f; }
  .entry .pnl { font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .entry .del { background: none; border: none; color: #6b7280; font-size: 16px; padding: 4px 8px; }
  .empty { text-align: center; padding: 30px; border: 1px dashed #262A38; border-radius: 12px; color: #6b7280; font-size: 13px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
  .modal-bg.show { display: flex; }
  .modal { background: #12141F; border: 1px solid #262A38; border-radius: 14px; padding: 18px; width: 100%; max-width: 360px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-family: 'Fraunces', serif; font-size: 18px; margin: 0 0 12px; color: #F2ECD9; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 4px; margin-top: 10px; }
  input, textarea {
    width: 100%; background: #0A0C13; border: 1px solid #262A38; border-radius: 8px;
    padding: 8px 10px; font-size: 13px; color: #F2ECD9; font-family: 'JetBrains Mono', monospace;
  }
  textarea { height: 56px; resize: none; }
  input:focus, textarea:focus { outline: none; border-color: #D4A857; }
  .close { background: none; border: none; color: #6b7280; font-size: 20px; float: right; }
  .err { background: #2E1D1D; border: 1px solid #C76B63; color: #E3AFA9; font-size: 12px; padding: 8px 12px; border-radius: 8px; margin-bottom: 14px; display: none; }
  svg text { font-family: 'JetBrains Mono', monospace; }

  /* Segmented control (Direction / Session) */
  .seg { display: flex; gap: 6px; background: #0A0C13; border: 1px solid #262A38; border-radius: 9px; padding: 3px; }
  .seg-opt { flex: 1; text-align: center; padding: 7px 4px; border-radius: 7px; font-size: 12px; font-weight: 600; color: #6b7280; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all .15s; border: 1px solid transparent; }
  .seg-opt.active { background: #1B2030; color: #F2ECD9; border-color: currentColor; }

  /* Strategy custom dropdown */
  .strat-select { position: relative; }
  .strat-trigger { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .strat-panel { display: none; position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: #12141F; border: 1px solid #262A38; border-radius: 10px; padding: 6px; z-index: 20; max-height: 180px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .strat-panel.show { display: block; }
  .strat-item { padding: 8px 10px; font-size: 13px; border-radius: 7px; cursor: pointer; font-family: 'JetBrains Mono', monospace; color: #dcd6c8; }
  .strat-item:hover, .strat-item.active { background: #1B2030; color: #D4A857; }
  .strat-add { display: flex; gap: 6px; padding: 6px; border-top: 1px solid #262A38; margin-top: 4px; }
  .strat-add input { font-size: 12px; padding: 6px 8px; }
  .strat-add button { background: #D4A857; color: #0A0C13; border: none; border-radius: 6px; padding: 0 10px; font-size: 12px; font-weight: 700; }

  /* Screenshot upload */
  .shot-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .shot-btn { border: 1px dashed #33394A; background: #0A0C13; color: #8A93A8; font-size: 12px; padding: 10px; border-radius: 8px; text-align: center; flex: 1; cursor: pointer; }
  .shot-preview { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; border: 1px solid #262A38; }
  .shot-remove { background: none; border: none; color: #C76B63; font-size: 12px; }

  /* Strategy tab cards */
  .strat-card { background: #12141F; border: 1px solid #262A38; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .strat-card-top { display: flex; justify-content: space-between; align-items: center; }
  .strat-card-name { font-size: 15px; font-weight: 700; color: #F2ECD9; font-family: 'Fraunces', serif; }
  .strat-card-stats { display: flex; gap: 14px; margin-top: 8px; font-size: 11px; color: #6b7280; }
  .strat-card-stats b { color: #dcd6c8; font-family: 'JetBrains Mono', monospace; }
  .strat-filtered { margin-top: 10px; border-top: 1px dashed #262A38; padding-top: 10px; display: none; }
  .strat-filtered.show { display: block; }

  .img-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 60; }
  .img-modal-bg.show { display: flex; }
  .img-modal-bg img { max-width: 100%; max-height: 85vh; border-radius: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>The Ledger</h1>
      <div class="sub">A quiet record of every trade, win or loss.</div>
    </div>
    <div id="ring"></div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabHistoryBtn" onclick="switchTab('history')">History</div>
    <div class="tab" id="tabStrategyBtn" onclick="switchTab('strategy')">Strategy</div>
  </div>

  <div class="err" id="err"></div>

  <!-- HISTORY TAB -->
  <div id="tabHistory">
    <div class="stats" id="stats"></div>
    <div id="curveBox"></div>
    <div class="section-title">
      <span>Entries</span>
      <button class="primary" onclick="openForm()">+ Log trade</button>
    </div>
    <div id="entries"></div>
  </div>

  <!-- STRATEGY TAB -->
  <div id="tabStrategy" style="display:none;">
    <div class="section-title"><span>By strategy</span></div>
    <div id="strategyList"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="close" onclick="closeForm()">&times;</button>
    <h2>Log a trade</h2>
    <div class="row2">
      <div><label>Date</label><input type="date" id="f_date"></div>
      <div><label>Pair</label><input type="text" id="f_pair" value="XAUUSD"></div>
    </div>

    <label>Direction</label>
    <div class="seg" id="segDirection">
      <div class="seg-opt" data-val="long" style="color:#6FAE8C">Long</div>
      <div class="seg-opt" data-val="short" style="color:#C76B63">Short</div>
    </div>

    <label>Session</label>
    <div class="seg" id="segSession"></div>

    <label>Strategy</label>
    <div class="strat-select" id="stratSelect">
      <div class="strat-trigger" id="stratTrigger">
        <span id="stratTriggerText">Select strategy</span>
        <span>▾</span>
      </div>
      <div class="strat-panel" id="stratPanel"></div>
    </div>

    <div class="row2">
      <div><label>Entry price</label><input type="number" step="any" id="f_entry"></div>
      <div><label>Exit price</label><input type="number" step="any" id="f_exit"></div>
    </div>
    <div class="row2">
      <div><label>Lots</label><input type="number" step="any" id="f_lots"></div>
      <div><label>P&L</label><input type="number" step="any" id="f_pnl"></div>
    </div>

    <label>Notes (optional)</label>
    <textarea id="f_notes" placeholder="Setup, mistake, lesson…"></textarea>

    <label>Screenshot (optional)</label>
    <div class="shot-row">
      <label class="shot-btn" id="shotBtnLabel">Tap to add chart screenshot
        <input type="file" accept="image/*" id="f_image" style="display:none;">
      </label>
      <img id="shotPreview" class="shot-preview" style="display:none;">
      <button class="shot-remove" id="shotRemoveBtn" style="display:none;" onclick="removeShot()">Remove</button>
    </div>

    <button class="primary" style="width:100%; margin-top:14px; padding:10px;" onclick="addEntry()">Add to ledger</button>
  </div>
</div>

<div class="img-modal-bg" id="imgModalBg" onclick="closeImgModal()">
  <img id="imgModalImg" src="">
</div>

<script>
const SESSIONS = [
  { id: 'asian', label: 'Asian', ist: '5:30 AM – 1:30 PM', start: 5.5, end: 13.5, color: '#7C93B3' },
  { id: 'london', label: 'London', ist: '12:30 PM – 2:30 AM', start: 12.5, end: 26.5, color: '#D4A857' },
  { id: 'ny', label: 'New York', ist: '6:00 PM – 8:30 AM', start: 18, end: 32.5, color: '#C76B63' },
];

const DEFAULT_STRATEGIES = ['FVG', 'Order Block', 'Liquidity Sweep', 'Kill Zone', 'VWAP Reversal', 'Breakout'];

let entries = JSON.parse(localStorage.getItem('ledger-entries') || '[]');
let strategies = JSON.parse(localStorage.getItem('ledger-strategies') || 'null') || DEFAULT_STRATEGIES.slice();
let currentDirection = 'long';
let currentSession = 'ny';
let currentStrategy = strategies[0] || '';
let pendingImage = null;
let activeTab = 'history';
let expandedStrategy = null;

function saveEntries() { localStorage.setItem('ledger-entries', JSON.stringify(entries)); render(); }
function saveStrategies() { localStorage.setItem('ledger-strategies', JSON.stringify(strategies)); }

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = msg ? 'block' : 'none';
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabHistory').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('tabStrategy').style.display = tab === 'strategy' ? 'block' : 'none';
  document.getElementById('tabHistoryBtn').classList.toggle('active', tab === 'history');
  document.getElementById('tabStrategyBtn').classList.toggle('active', tab === 'strategy');
  if (tab === 'strategy') renderStrategyTab();
}

/* ---- Segmented controls ---- */
function buildSeg(containerId, options, current, onPick) {
  const el = document.getElementById(containerId);
  el.innerHTML = options.map(o => `<div class="seg-opt ${o.value===current?'active':''}" data-val="${o.value}" style="color:${o.color||'#dcd6c8'}">${o.label}</div>`).join('');
  el.querySelectorAll('.seg-opt').forEach(node => {
    node.onclick = () => { onPick(node.getAttribute('data-val')); buildSeg(containerId, options, node.getAttribute('data-val'), onPick); };
  });
}

function initDirectionSeg() {
  buildSeg('segDirection', [
    { value: 'long', label: 'Long', color: '#6FAE8C' },
    { value: 'short', label: 'Short', color: '#C76B63' },
  ], currentDirection, v => currentDirection = v);
}
function initSessionSeg() {
  buildSeg('segSession', SESSIONS.map(s => ({ value: s.id, label: s.label, color: s.color })), currentSession, v => currentSession = v);
}

/* ---- Strategy custom dropdown ---- */
function renderStratPanel() {
  const panel = document.getElementById('stratPanel');
  panel.innerHTML = strategies.map(s => `<div class="strat-item ${s===currentStrategy?'active':''}" data-s="${s}">${s}</div>`).join('') +
    `<div class="strat-add">
      <input type="text" id="newStratInput" placeholder="Add new strategy…">
      <button onclick="addStrategy()">Add</button>
    </div>`;
  panel.querySelectorAll('.strat-item').forEach(node => {
    node.onclick = () => {
      currentStrategy = node.getAttribute('data-s');
      document.getElementById('stratTriggerText').textContent = currentStrategy;
      panel.classList.remove('show');
    };
  });
}
function addStrategy() {
  const input = document.getElementById('newStratInput');
  const val = input.value.trim();
  if (!val) return;
  if (!strategies.includes(val)) { strategies.push(val); saveStrategies(); }
  currentStrategy = val;
  document.getElementById('stratTriggerText').textContent = val;
  document.getElementById('stratPanel').classList.remove('show');
}
document.getElementById('stratTrigger').onclick = () => {
  renderStratPanel();
  document.getElementById('stratPanel').classList.toggle('show');
};
document.addEventListener('click', (e) => {
  if (!document.getElementById('stratSelect').contains(e.target)) {
    document.getElementById('stratPanel').classList.remove('show');
  }
});

/* ---- Screenshot handling ---- */
document.getElementById('f_image').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const maxW = 640;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      pendingImage = canvas.toDataURL('image/jpeg', 0.7);
      const prev = document.getElementById('shotPreview');
      prev.src = pendingImage;
      prev.style.display = 'block';
      document.getElementById('shotRemoveBtn').style.display = 'inline-block';
      document.getElementById('shotBtnLabel').textContent = 'Change screenshot';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
function removeShot() {
  pendingImage = null;
  document.getElementById('f_image').value = '';
  document.getElementById('shotPreview').style.display = 'none';
  document.getElementById('shotRemoveBtn').style.display = 'none';
  document.getElementById('shotBtnLabel').textContent = 'Tap to add chart screenshot';
}
function openImgModal(src) {
  document.getElementById('imgModalImg').src = src;
  document.getElementById('imgModalBg').classList.add('show');
}
function closeImgModal() { document.getElementById('imgModalBg').classList.remove('show'); }

/* ---- Form open/close ---- */
function openForm() {
  document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
  currentDirection = 'long';
  currentSession = 'ny';
  currentStrategy = strategies[0] || '';
  document.getElementById('stratTriggerText').textContent = currentStrategy || 'Select strategy';
  initDirectionSeg();
  initSessionSeg();
  removeShot();
  document.getElementById('modalBg').classList.add('show');
}
function closeForm() { document.getElementById('modalBg').classList.remove('show'); showErr(''); }

function addEntry() {
  const entry = parseFloat(document.getElementById('f_entry').value);
  const exit = parseFloat(document.getElementById('f_exit').value);
  const lots = parseFloat(document.getElementById('f_lots').value);
  const pnl = parseFloat(document.getElementById('f_pnl').value);
  if (isNaN(entry) || isNaN(exit) || isNaN(lots) || isNaN(pnl)) {
    showErr('Fill entry, exit, lots and P&L.'); return;
  }
  entries.push({
    id: Date.now().toString(),
    date: document.getElementById('f_date').value,
    pair: document.getElementById('f_pair').value || 'XAUUSD',
    direction: currentDirection,
    session: currentSession,
    strategy: currentStrategy,
    notes: document.getElementById('f_notes').value,
    image: pendingImage,
    entry, exit, lots, pnl,
  });
  entries.sort((a,b) => new Date(a.date) - new Date(b.date));
  ['f_entry','f_exit','f_lots','f_pnl','f_notes'].forEach(id => document.getElementById(id).value = '');
  showErr('');
  closeForm();
  saveEntries();
}

function delEntry(id) {
  entries = entries.filter(e => e.id !== id);
  saveEntries();
}

/* ---- Session ring ---- */
function renderRing() {
  const now = new Date();
  const istHour = ((now.getUTCHours() + 5.5) % 24) + now.getUTCMinutes()/60;
  const angle = (istHour/24)*360 - 90;
  const cx=64, cy=64, r=54;
  const arcs = SESSIONS.map(s => {
    const a1 = (s.start/24)*360 - 90, a2 = (s.end/24)*360 - 90;
    const x1 = cx + r*Math.cos(a1*Math.PI/180), y1 = cy + r*Math.sin(a1*Math.PI/180);
    const x2 = cx + r*Math.cos(a2*Math.PI/180), y2 = cy + r*Math.sin(a2*Math.PI/180);
    const largeArc = (s.end - s.start) > 12 ? 1 : 0;
    return `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}" fill="none" stroke="${s.color}" stroke-width="10" stroke-linecap="round" opacity="0.85"/>`;
  }).join('');
  const handX = cx + (r-8)*Math.cos(angle*Math.PI/180), handY = cy + (r-8)*Math.sin(angle*Math.PI/180);
  const timeStr = now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' });
  document.getElementById('ring').innerHTML = `
    <svg width="104" height="104" viewBox="0 0 128 128">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#262A38" stroke-width="10"/>
      ${arcs}
      <line x1="${cx}" y1="${cy}" x2="${handX}" y2="${handY}" stroke="#F2ECD9" stroke-width="2"/>
      <circle cx="${cx}" cy="${cy}" r="3" fill="#F2ECD9"/>
      <text x="${cx}" y="${cy+24}" text-anchor="middle" fill="#8A93A8" font-size="9">${timeStr} IST</text>
    </svg>`;
}

/* ---- History tab stats/curve/entries ---- */
function computeStats(list) {
  const wins = list.filter(e=>e.pnl>0), losses = list.filter(e=>e.pnl<0);
  const total = list.reduce((s,e)=>s+e.pnl,0);
  const winRate = list.length ? (wins.length/list.length)*100 : 0;
  const avgWin = wins.length ? wins.reduce((s,e)=>s+e.pnl,0)/wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((s,e)=>s+e.pnl,0)/losses.length : 0;
  return { total, winRate, avgWin, avgLoss, wins: wins.length, losses: losses.length, count: list.length };
}

function renderStats() {
  const box = document.getElementById('stats');
  if (entries.length === 0) {
    box.style.display = 'none';
    if (!document.getElementById('emptyMsg')) box.insertAdjacentHTML('afterend', '<div class="empty" id="emptyMsg">No entries yet. Log your first trade to open the ledger.</div>');
    return;
  }
  box.style.display = 'grid';
  const old = document.getElementById('emptyMsg'); if (old) old.remove();
  const s = computeStats(entries);
  box.innerHTML = `
    <div class="card"><div class="label">Total P&L</div><div class="value ${s.total>=0?'pos':'neg'}">${s.total>=0?'+':''}${s.total.toFixed(2)}</div></div>
    <div class="card"><div class="label">Win rate</div><div class="value">${s.winRate.toFixed(0)}%</div></div>
    <div class="card"><div class="label">Trades</div><div class="value">${s.count}</div><div class="label" style="margin-top:2px">${s.wins}W / ${s.losses}L</div></div>
    <div class="card"><div class="label">Avg win / loss</div><div class="value" style="font-size:14px">${s.avgWin.toFixed(1)} / ${s.avgLoss.toFixed(1)}</div></div>`;
}

function renderCurve() {
  const box = document.getElementById('curveBox');
  if (entries.length < 2) { box.innerHTML = ''; return; }
  let running = 0;
  const pts = entries.map(e => { running += e.pnl; return running; });
  const w = 440, h = 140, pad = 10;
  const min = Math.min(0, ...pts), max = Math.max(0, ...pts);
  const range = (max - min) || 1;
  const stepX = (w - pad*2) / (pts.length - 1);
  const coords = pts.map((v,i) => {
    const x = pad + i*stepX;
    const y = h - pad - ((v - min)/range)*(h - pad*2);
    return `${x},${y}`;
  }).join(' ');
  const zeroY = h - pad - ((0 - min)/range)*(h - pad*2);
  box.innerHTML = `
    <div class="card" style="margin-bottom:20px;">
      <div class="label" style="margin-bottom:8px;">Equity curve</div>
      <svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <line x1="0" y1="${zeroY}" x2="${w}" y2="${zeroY}" stroke="#6b7280" stroke-width="1"/>
        <polyline points="${coords}" fill="none" stroke="#D4A857" stroke-width="2"/>
      </svg>
    </div>`;
}

function entryRowHTML(e) {
  const s = SESSIONS.find(s=>s.id===e.session);
  return `
    <div class="entry">
      ${e.image ? `<img class="thumb" src="${e.image}" onclick="openImgModal('${e.image}')">` : ''}
      <div style="flex:1;">
        <div>${e.pair} · ${e.direction === 'long' ? 'Long' : 'Short'}</div>
        <div class="meta">${e.date} · ${s ? s.label : ''} · ${e.lots} lots</div>
        ${e.strategy ? `<div class="strat-chip">${e.strategy}</div>` : ''}
        ${e.notes ? `<div class="meta" style="font-style:italic; margin-top:4px;">${e.notes}</div>` : ''}
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="pnl ${e.pnl>=0?'pos':'neg'}">${e.pnl>=0?'+':''}${e.pnl.toFixed(2)}</div>
        <button class="del" onclick="delEntry('${e.id}')">✕</button>
      </div>
    </div>`;
}

function renderEntries() {
  const box = document.getElementById('entries');
  box.innerHTML = [...entries].reverse().map(entryRowHTML).join('');
}

/* ---- Strategy tab ---- */
function renderStrategyTab() {
  const box = document.getElementById('strategyList');
  const used = strategies.filter(s => entries.some(e => e.strategy === s));
  if (used.length === 0) {
    box.innerHTML = '<div class="empty">No strategy-tagged trades yet. Tag a strategy when logging a trade.</div>';
    return;
  }
  box.innerHTML = used.map(s => {
    const list = entries.filter(e => e.strategy === s);
    const stat = computeStats(list);
    const isOpen = expandedStrategy === s;
    return `
      <div class="strat-card">
        <div class="strat-card-top" onclick="toggleStrategy('${s}')">
          <span class="strat-card-name">${s}</span>
          <span class="pnl ${stat.total>=0?'pos':'neg'}">${stat.total>=0?'+':''}${stat.total.toFixed(2)}</span>
        </div>
        <div class="strat-card-stats">
          <span>Trades <b>${stat.count}</b></span>
          <span>Win rate <b>${stat.winRate.toFixed(0)}%</b></span>
          <span>Avg W/L <b>${stat.avgWin.toFixed(1)}/${stat.avgLoss.toFixed(1)}</b></span>
        </div>
        <div class="strat-filtered ${isOpen ? 'show' : ''}" id="stratFiltered-${s.replace(/\s+/g,'_')}">
          ${isOpen ? [...list].reverse().map(entryRowHTML).join('') : ''}
        </div>
      </div>`;
  }).join('');
}
function toggleStrategy(s) {
  expandedStrategy = expandedStrategy === s ? null : s;
  renderStrategyTab();
}

function render() {
  renderRing();
  renderStats();
  renderCurve();
  renderEntries();
  if (activeTab === 'strategy') renderStrategyTab();
}

render();
setInterval(renderRing, 30000);
</script>
</body>
</html>
